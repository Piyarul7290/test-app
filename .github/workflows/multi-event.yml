on:
  push:
    - dev
  pull_request:
    branches:
      - main

jobs:
  hello_world:
    runs-on: ubuntu-latest
    steps:
      -name: "Echo Basic Information"
      run: 
        echo "REF: $GITHUB_REF"
        echo "Job ID: $GITHUB_JOB"
        echo "Action: $GITHUB_ACTION"
        echo "Action: $GITHUB_ACTOR"